<!DOCTYPE html>
<html>
<head>
    <title>WatchFlix</title>
</head>
<body>
    <h1>WatchFlix</h1>

    <nav>
        <a href="/">Home</a>
        <a href="/watchlist">My Watchlist</a>
        <a href="/favorites">Favorites</a>
    </nav>

    <h2>Movies and TV Shows</h2>

    <p>Welcome to WatchFlix. Here you can browse movies and TV shows and add them to your personal watchlist.</p>

    <div>
        {% for item in content %}
            <div>
                <h3>{{ item[1] }}</h3>
                <p>Type: {{ item[2] }}</p>
                <p>Release year: {{ item[3] }}</p>
                <p>IMDb rating: {{ item[4] }}</p>

                <form action="/add/{{ item[0] }}" method="post">
                    <button type="submit">Add to watchlist</button>
                </form>
            </div>
        {% endfor %}
    </div>
</body>
</html>
